name: Deploy Vite app to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build app
        run: npm run build

      - name: Verify Pages build output
        run: |
          test -f dist/index.html
          if grep -q 'src="/src/main.jsx"' dist/index.html; then
            echo "ERROR: dist/index.html still points to raw Vite source /src/main.jsx"
            exit 1
          fi
          if ! grep -q '/pink-elephant-jungle-dash/assets/' dist/index.html; then
            echo "ERROR: dist/index.html does not contain the expected GitHub Pages asset path"
            cat dist/index.html
            exit 1
          fi
          find dist -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
