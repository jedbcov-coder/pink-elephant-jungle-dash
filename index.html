<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A React and Three.js jungle dash starring a pink elephant." />
    <meta name="theme-color" content="#0c2217" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pink Elephant" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
    <title>Pink Elephant Jungle Dash</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #0c2217;
      }

      .boot-screen {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        color: #fffbeb;
        background:
          radial-gradient(circle at 50% 18%, rgba(244, 114, 182, 0.22), transparent 28rem),
          linear-gradient(180deg, #102412 0%, #07180f 100%);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      .boot-card {
        width: min(36rem, 100%);
        border: 1px solid rgba(246, 210, 138, 0.28);
        border-radius: 2rem;
        background: rgba(12, 20, 10, 0.82);
        box-shadow: 0 0 55px rgba(255, 180, 80, 0.15), 0 1.25rem 3rem rgba(0, 0, 0, 0.38);
        padding: clamp(1.5rem, 6vw, 2.5rem);
      }

      .boot-kicker {
        color: rgba(167, 243, 208, 0.78);
        font-size: 0.75rem;
        font-weight: 900;
        letter-spacing: 0.32em;
        text-transform: uppercase;
      }

      .boot-title {
        margin: 0.75rem 0 0;
        color: #f9a8d4;
        font-size: clamp(2.5rem, 10vw, 4rem);
        font-weight: 900;
        line-height: 0.95;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.55);
      }

      .boot-subtitle {
        margin: 0.25rem 0 0;
        color: #fef3c7;
        font-size: clamp(1.5rem, 6vw, 2.25rem);
        font-weight: 900;
        letter-spacing: 0.05em;
      }

      .boot-copy {
        max-width: 26rem;
        margin: 1rem auto 0;
        color: rgba(255, 251, 235, 0.74);
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .boot-status {
        margin-top: 1.35rem;
        color: rgba(253, 230, 138, 0.78);
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-screen" aria-live="polite">
        <section class="boot-card">
          <div class="boot-kicker">Three-Loop Jungle Trial</div>
          <h1 class="boot-title">Pink Elephant</h1>
          <div class="boot-subtitle">Jungle Dash</div>
          <p class="boot-copy">
            Loading the 3D jungle dash. If this message stays on screen, refresh the page or check that JavaScript is enabled.
          </p>
          <div class="boot-status">Loading game…</div>
        </section>
      </main>
    </div>
    <noscript>
      <style>.boot-status::before { content: "JavaScript is required to play. "; }</style>
    </noscript>
    <script>
      window.__PEJD_BOOT__ = {
        moduleStarted: false,
        mounted: false,
      };

      window.setTimeout(() => {
        const bootStatus = document.querySelector(".boot-status");
        if (!window.__PEJD_BOOT__?.moduleStarted && bootStatus) {
          bootStatus.textContent =
            "Game bundle did not load. This is likely a GitHub Pages deployment or asset path problem.";
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
