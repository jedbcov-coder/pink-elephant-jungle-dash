<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c2217" />
    <title>Pink Elephant Jungle Dash Offline</title>
    <style>
      html, body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background: linear-gradient(180deg, #102412 0%, #06140c 100%);
        color: #fffbeb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      main {
        width: min(34rem, 100%);
        border: 1px solid rgba(246, 210, 138, 0.28);
        border-radius: 24px;
        background: rgba(12, 20, 10, 0.86);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
        padding: clamp(1.5rem, 6vw, 2.5rem);
      }

      h1 {
        margin: 0;
        color: #f9a8d4;
        font-size: clamp(2rem, 8vw, 3.25rem);
        line-height: 1;
      }

      p {
        color: rgba(255, 251, 235, 0.76);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        margin-top: 0.5rem;
        border-radius: 999px;
        background: #f472b6;
        color: #020617;
        font-weight: 900;
        padding: 0.75rem 1.3rem;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline Jungle</h1>
      <p>The game shell is cached, but this page or asset was not available offline yet. Reconnect once, open the game again, and the service worker will refresh the cache.</p>
      <a href="./">Return to Game</a>
    </main>
  </body>
</html>
